<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0 L8 4 L0 8 Z" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="675" fill="#FAFAF7"/>

  <!-- title -->
  <text x="40" y="72" font-size="30" font-weight="bold" fill="#232838">The gates — a PR's path to merge</text>

  <!-- step numbers -->
  <text x="100" y="108" font-size="15" fill="#6B7280" text-anchor="middle">1</text>
  <text x="276.5" y="108" font-size="15" fill="#6B7280" text-anchor="middle">2</text>
  <text x="470.5" y="108" font-size="15" fill="#6B7280" text-anchor="middle">3</text>
  <text x="672" y="108" font-size="15" fill="#6B7280" text-anchor="middle">4</text>
  <text x="876" y="108" font-size="15" fill="#6B7280" text-anchor="middle">5</text>

  <!-- step 1: PR opened -->
  <rect x="40" y="118" width="120" height="154" rx="10" fill="#FAFAF7" stroke="#232838" stroke-width="2"/>
  <text x="100" y="190" font-size="20" font-weight="bold" fill="#232838" text-anchor="middle">PR</text>
  <text x="100" y="214" font-size="20" font-weight="bold" fill="#232838" text-anchor="middle">opened</text>

  <!-- step 2: clean-checkout run -->
  <rect x="184" y="118" width="185" height="154" rx="10" fill="#FAFAF7" stroke="#232838" stroke-width="2"/>
  <text x="276.5" y="160" font-size="20" font-weight="bold" fill="#232838" text-anchor="middle">Clean-checkout</text>
  <text x="276.5" y="184" font-size="20" font-weight="bold" fill="#232838" text-anchor="middle">run</text>
  <text x="276.5" y="214" font-size="17" fill="#6B7280" text-anchor="middle">full suite,</text>
  <text x="276.5" y="236" font-size="17" fill="#6B7280" text-anchor="middle">1,667 assertions</text>

  <!-- step 3: CI + live CodeQL -->
  <rect x="393" y="118" width="155" height="154" rx="10" fill="#FAFAF7" stroke="#232838" stroke-width="2"/>
  <text x="470.5" y="172" font-size="20" font-weight="bold" fill="#232838" text-anchor="middle">CI + live</text>
  <text x="470.5" y="196" font-size="20" font-weight="bold" fill="#232838" text-anchor="middle">CodeQL</text>
  <text x="470.5" y="226" font-size="17" fill="#6B7280" text-anchor="middle">blocking gates</text>

  <!-- step 4: review brief -->
  <rect x="572" y="118" width="200" height="154" rx="10" fill="#FAFAF7" stroke="#232838" stroke-width="2"/>
  <text x="672" y="160" font-size="20" font-weight="bold" fill="#232838" text-anchor="middle">Review brief</text>
  <text x="672" y="188" font-size="17" fill="#6B7280" text-anchor="middle">spec-fit ·</text>
  <text x="672" y="210" font-size="17" fill="#6B7280" text-anchor="middle">contributor</text>
  <text x="672" y="232" font-size="17" fill="#6B7280" text-anchor="middle">history ·</text>
  <text x="672" y="254" font-size="17" fill="#6B7280" text-anchor="middle">collision map</text>

  <!-- step 5: human decision -->
  <rect x="796" y="118" width="160" height="154" rx="10" fill="#FAFAF7" stroke="#232838" stroke-width="2"/>
  <text x="876" y="164" font-size="20" font-weight="bold" fill="#232838" text-anchor="middle">Human</text>
  <text x="876" y="188" font-size="20" font-weight="bold" fill="#232838" text-anchor="middle">decision</text>
  <text x="876" y="218" font-size="17" fill="#6B7280" text-anchor="middle">evidence</text>
  <text x="876" y="240" font-size="17" fill="#6B7280" text-anchor="middle">attached</text>

  <!-- final accent box -->
  <rect x="980" y="118" width="180" height="154" rx="10" fill="#C9573A" stroke="#C9573A" stroke-width="2"/>
  <text x="1070" y="158" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Merge &#8594;</text>
  <text x="1070" y="184" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">exit 0 &#8594;</text>
  <text x="1070" y="210" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">only then</text>
  <text x="1070" y="236" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">announce</text>

  <!-- pipeline arrows -->
  <line x1="163" y1="195" x2="180" y2="195" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="372" y1="195" x2="389" y2="195" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="551" y1="195" x2="568" y2="195" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="775" y1="195" x2="792" y2="195" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="959" y1="195" x2="976" y2="195" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- elbow arrows from extra gates up to the steps they reinforce -->
  <path d="M 218.5 415 L 218.5 350 L 470.5 350 L 470.5 282" fill="none" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 599.5 415 L 599.5 374 L 672 374 L 672 282" fill="none" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 980.5 415 L 980.5 350 L 876 350 L 876 282" fill="none" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- extra gates section label -->
  <text x="40" y="404" font-size="15" fill="#6B7280">Extra gates</text>

  <!-- gate 1: first-timer gate -->
  <rect x="40" y="415" width="357" height="130" rx="10" fill="#E5E3DC" stroke="#232838" stroke-width="2"/>
  <text x="218.5" y="462" font-size="20" font-weight="bold" fill="#232838" text-anchor="middle">First-timer gate</text>
  <text x="218.5" y="492" font-size="17" fill="#6B7280" text-anchor="middle">CI approved + waited until</text>
  <text x="218.5" y="514" font-size="17" fill="#6B7280" text-anchor="middle">green, never bypassed</text>

  <!-- gate 2: plugins -->
  <rect x="421" y="415" width="357" height="130" rx="10" fill="#E5E3DC" stroke="#232838" stroke-width="2"/>
  <text x="599.5" y="462" font-size="20" font-weight="bold" fill="#232838" text-anchor="middle">Plugins</text>
  <text x="599.5" y="492" font-size="17" fill="#6B7280" text-anchor="middle">multi-agent adversarial review,</text>
  <text x="599.5" y="514" font-size="17" fill="#6B7280" text-anchor="middle">registry pins reviewed SHA</text>

  <!-- gate 3: sensitive files -->
  <rect x="802" y="415" width="358" height="130" rx="10" fill="#E5E3DC" stroke="#232838" stroke-width="2"/>
  <text x="981" y="462" font-size="20" font-weight="bold" fill="#232838" text-anchor="middle">Sensitive files</text>
  <text x="981" y="492" font-size="17" fill="#6B7280" text-anchor="middle">tiered by blast radius, policy</text>
  <text x="981" y="514" font-size="17" fill="#6B7280" text-anchor="middle">close without discussion</text>

  <!-- caption -->
  <text x="600" y="625" font-size="15" font-style="italic" fill="#6B7280" text-anchor="middle">Every gate exists because something real broke first.</text>
</svg>
